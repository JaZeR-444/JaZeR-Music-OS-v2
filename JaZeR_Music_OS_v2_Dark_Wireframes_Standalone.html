<!DOCTYPE html>
<html lang="en">
<head>
<!-- Standalone Dark theme wireframes generated from uploaded package. Requires internet only for React/Babel/font CDN. -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JaZeR Music OS v2 — Wireframes (Dark)</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&family=Cutive+Mono&display=swap" rel="stylesheet">
<style>
/* ===========================================================
   JaZeR Music OS v2 — Notion-style Wireframes (sketchy / low-fi)
   =========================================================== */

:root {
  /* ============================================================
     NOTION COLOR PALETTE — source of truth
     All wireframe pills, tags, accents, and document colors
     are built off these. Updating these updates the whole site.
     ============================================================ */

  /* Notion text colors */
  --notion-default: #37352f;
  --notion-gray:    #9b9a97;
  --notion-brown:   #64473a;
  --notion-orange:  #d9730d;
  --notion-yellow:  #dfab01;
  --notion-green:   #0f7b6c;
  --notion-blue:    #0b6e99;
  --notion-purple:  #6940a5;
  --notion-pink:    #ad1a72;
  --notion-red:     #e03e3e;

  /* Notion background colors */
  --notion-default-bg: #ffffff;
  --notion-gray-bg:    #f1f1ef;
  --notion-brown-bg:   #f4eeee;
  --notion-orange-bg:  #faebdd;
  --notion-yellow-bg:  #fbf3db;
  --notion-green-bg:   #ddedea;
  --notion-blue-bg:    #ddebf1;
  --notion-purple-bg:  #eae4f2;
  --notion-pink-bg:    #f4dfeb;
  --notion-red-bg:     #fbe4e4;

  /* ============================================================
     Wireframe theme — paper/ink + role mappings to Notion palette
     ============================================================ */

  --paper:   #fdfaf3;
  --paper-2: #f5f1e6;
  --paper-3: #ebe5d2;
  --ink:     var(--notion-default);
  --ink-2:   #5a5345;
  --ink-3:   var(--notion-gray);
  --line:    #c8c1ac;
  --line-2:  #a8a190;
  --rule:    #d8d2bd;

  /* Role aliases — the wireframe's three accents now point at Notion hues */
  --accent:   var(--notion-orange);   /* warm marker (was #c96442) */
  --accent-2: var(--notion-yellow);   /* highlight        */
  --accent-3: var(--notion-green);    /* affirmative      */
  --post-it:  var(--notion-yellow-bg);

  --font-hand:  'Caveat', 'Bradley Hand', cursive;
  --font-print: 'Kalam', 'Comic Sans MS', cursive;
  --font-mono:  'Cutive Mono', 'Courier New', monospace;
}

/* Notion color utility classes — usable directly in markup */
.notion-default { color: var(--notion-default); }
.notion-gray    { color: var(--notion-gray); }
.notion-brown   { color: var(--notion-brown); }
.notion-orange  { color: var(--notion-orange); }
.notion-yellow  { color: var(--notion-yellow); }
.notion-green   { color: var(--notion-green); }
.notion-blue    { color: var(--notion-blue); }
.notion-purple  { color: var(--notion-purple); }
.notion-pink    { color: var(--notion-pink); }
.notion-red     { color: var(--notion-red); }

.notion-default-bg { background-color: var(--notion-default-bg); }
.notion-gray-bg    { background-color: var(--notion-gray-bg); }
.notion-brown-bg   { background-color: var(--notion-brown-bg); }
.notion-orange-bg  { background-color: var(--notion-orange-bg); }
.notion-yellow-bg  { background-color: var(--notion-yellow-bg); }
.notion-green-bg   { background-color: var(--notion-green-bg); }
.notion-blue-bg    { background-color: var(--notion-blue-bg); }
.notion-purple-bg  { background-color: var(--notion-purple-bg); }
.notion-pink-bg    { background-color: var(--notion-pink-bg); }
.notion-red-bg     { background-color: var(--notion-red-bg); }

/* ============================================================
   DARK THEME — Notion dark mode palette
   Apply via `<body class="theme-dark">` (or any ancestor).
   ============================================================ */
.theme-dark {
  /* Notion dark-mode text colors */
  --notion-default: #ffffff;
  --notion-gray:    #9b9a97;
  --notion-brown:   #937264;
  --notion-orange:  #ffa344;
  --notion-yellow:  #ffdc49;
  --notion-green:   #4dab9a;
  --notion-blue:    #529cca;
  --notion-purple:  #9a6dd7;
  --notion-pink:    #e255a1;
  --notion-red:     #ff7369;

  /* Notion dark-mode background colors */
  --notion-default-bg: #191919;
  --notion-gray-bg:    #2f2f2f;
  --notion-brown-bg:   #4a3228;
  --notion-orange-bg:  #5c3b23;
  --notion-yellow-bg:  #564328;
  --notion-green-bg:   #243d3a;
  --notion-blue-bg:    #143047;
  --notion-purple-bg:  #3c2d49;
  --notion-pink-bg:    #4e2c3c;
  --notion-red-bg:     #522e2a;

  /* Paper / ink role mappings for dark */
  --paper:   #191919;
  --paper-2: #232323;
  --paper-3: #2f2f2f;
  --ink:     #e5e5e2;
  --ink-2:   #b8b6af;
  --ink-3:   #6f6e6a;
  --line:    #3a3a36;
  --line-2:  #4a4a44;
  --rule:    #2a2a26;

  --post-it: var(--notion-yellow-bg);
}

/* Pill borders need re-tuning for dark surfaces — slightly transparent
   versions of the text color blend with the dark bg better than the
   light-mode hard borders. */
.theme-dark .wf-pill         { border-color: rgba(255,255,255,0.12); }
.theme-dark .wf-pill.warn    { border-color: rgba(255,163,68,0.4); }
.theme-dark .wf-pill.go      { border-color: rgba(77,171,154,0.4); }
.theme-dark .wf-pill.idea    { border-color: rgba(255,220,73,0.4); }
.theme-dark .wf-pill.todo    { border-color: rgba(154,109,215,0.4); }
.theme-dark .wf-pill.info    { border-color: rgba(82,156,202,0.4); }
.theme-dark .wf-pill.alert   { border-color: rgba(255,115,105,0.4); }
.theme-dark .wf-pill.brown   { border-color: rgba(147,114,100,0.4); }
.theme-dark .wf-pill.pink    { border-color: rgba(226,85,161,0.4); }

/* ---- Wireframe artboard base ---- */
.wf {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-print);
  font-size: 13px;
  line-height: 1.4;
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--line-2);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
}

/* Subtle paper texture via subtle noise */
.wf::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(180,168,140,.08) 0, transparent 30%),
    radial-gradient(circle at 88% 70%, rgba(180,168,140,.06) 0, transparent 30%);
  pointer-events: none;
  z-index: 0;
}
.wf > * { position: relative; z-index: 1; }

/* ---- Notion-style chrome ---- */
.wf-topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px dashed var(--line);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-3);
  background: var(--paper-2);
}
.wf-topbar .crumb { display: flex; align-items: center; gap: 6px; }
.wf-topbar .crumb-sep { color: var(--line-2); }
.wf-topbar .crumb-now { color: var(--ink); }
.wf-topbar .spacer { flex: 1; }
.wf-topbar .icon-row { display: flex; gap: 6px; color: var(--ink-3); }
.wf-topbar .icon-row span { font-size: 11px; }

.wf-body {
  flex: 1;
  display: grid;
  grid-template-columns: 130px 1fr;
  min-height: 0;
}

.wf-sidebar {
  background: var(--paper-2);
  border-right: 1px dashed var(--line);
  padding: 10px 8px;
  font-size: 11px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
}
.wf-sb-section {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-3);
  margin: 8px 4px 2px;
}
.wf-sb-section:first-child { margin-top: 0; }
.wf-sb-item {
  padding: 3px 6px;
  border-radius: 3px;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: default;
}
.wf-sb-item.active {
  background: var(--paper-3);
  color: var(--ink);
  font-weight: 600;
}
.wf-sb-item .ico { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }

.wf-main {
  padding: 14px 18px;
  overflow: auto;
  background: var(--paper);
}

/* ---- Page chrome inside main ---- */
.wf-pagehead { margin-bottom: 14px; }
.wf-pagehead .breadcrumb {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.wf-pagehead h1 {
  font-family: var(--font-hand);
  font-weight: 700;
  font-size: 30px;
  line-height: 1;
  color: var(--ink);
  margin: 0;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wf-pagehead h1 .emoji { font-family: 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif; font-size: 22px; }

.wf-pagehead .subtitle {
  font-family: var(--font-print);
  font-size: 11px;
  color: var(--ink-3);
  margin-top: 4px;
}

/* Blocks */
.wf-block { margin-bottom: 14px; }
.wf-block-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.wf-block-h {
  font-family: var(--font-hand);
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 4px;
  line-height: 1;
}

/* ---- Capture button (template button) ---- */
.wf-capture {
  border: 2px dashed var(--accent);
  border-radius: 6px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hand);
  font-size: 18px;
  color: var(--accent);
  background: rgba(201,100,66,0.04);
  margin-bottom: 14px;
  transform: rotate(-0.3deg);
}
.wf-capture .plus { font-weight: bold; margin-right: 6px; font-size: 22px; }

/* ---- Database views ---- */

/* Board / kanban */
.wf-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 8px 0;
}
.wf-board.cols-5 { grid-template-columns: repeat(5, 1fr); }
.wf-board.cols-3 { grid-template-columns: repeat(3, 1fr); }
.wf-col {
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 8px;
  min-height: 100px;
}
.wf-col-title {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}
.wf-col-title .count { color: var(--ink-2); }
.wf-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 5px 7px;
  font-size: 11px;
  color: var(--ink);
  margin-bottom: 5px;
  line-height: 1.3;
  transform: rotate(-0.15deg);
}
.wf-card:nth-child(2) { transform: rotate(0.3deg); }
.wf-card:nth-child(3) { transform: rotate(-0.2deg); }
.wf-card .card-meta {
  font-family: var(--font-mono);
  font-size: 8px;
  color: var(--ink-3);
  margin-top: 2px;
  letter-spacing: 0.5px;
}
.wf-card.has-warn { border-color: var(--accent); border-style: dashed; }
.wf-card.has-go { border-left: 3px solid var(--accent-3); }

/* Table */
.wf-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  margin: 8px 0;
  background: var(--paper);
  border: 1px solid var(--line);
}
.wf-table th {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-3);
  text-align: left;
  padding: 6px 8px;
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
  font-weight: normal;
}
.wf-table td {
  padding: 6px 8px;
  border-bottom: 1px dotted var(--line);
  color: var(--ink-2);
  vertical-align: middle;
}
.wf-table tr:last-child td { border-bottom: none; }
.wf-table .first-col { color: var(--ink); font-weight: 600; }

/* Property pill */
.wf-pill {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--notion-gray-bg);
  border: 1px solid var(--line);
  color: var(--notion-default);
  margin-right: 3px;
  letter-spacing: 0.3px;
}
/* Status / role pill colors — now Notion palette */
.wf-pill.warn   { background: var(--notion-orange-bg); color: var(--notion-orange); border-color: #e8c79e; }
.wf-pill.go     { background: var(--notion-green-bg);  color: var(--notion-green);  border-color: #a8c7b3; }
.wf-pill.idea   { background: var(--notion-yellow-bg); color: var(--notion-yellow); border-color: #e3cf85; }
.wf-pill.todo   { background: var(--notion-purple-bg); color: var(--notion-purple); border-color: #c4b1d9; }
.wf-pill.mute   { background: var(--notion-gray-bg);   color: var(--notion-gray); }
.wf-pill.info   { background: var(--notion-blue-bg);   color: var(--notion-blue);   border-color: #a8c7d6; }
.wf-pill.alert  { background: var(--notion-red-bg);    color: var(--notion-red);    border-color: #e8b8b8; }
.wf-pill.brown  { background: var(--notion-brown-bg);  color: var(--notion-brown);  border-color: #d9c2bd; }
.wf-pill.pink   { background: var(--notion-pink-bg);   color: var(--notion-pink);   border-color: #e3b8d2; }

/* Gallery */
.wf-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 8px 0;
}
.wf-gal {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 8px;
  font-size: 11px;
  transform: rotate(0.2deg);
}
.wf-gal:nth-child(even) { transform: rotate(-0.2deg); }
.wf-gal .gal-img {
  height: 50px;
  background:
    repeating-linear-gradient(135deg, var(--paper-2) 0 6px, var(--paper-3) 6px 12px);
  border-radius: 3px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--ink-3);
}
.wf-gal .gal-title {
  font-family: var(--font-hand);
  font-size: 15px;
  color: var(--ink);
  margin-bottom: 2px;
  line-height: 1;
}
.wf-gal .gal-meta {
  font-family: var(--font-mono);
  font-size: 8px;
  color: var(--ink-3);
  letter-spacing: 0.3px;
}

/* List row (Notion-style list) */
.wf-list-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-bottom: 1px dotted var(--line);
  font-size: 11px;
  color: var(--ink);
}
.wf-list-row:last-child { border-bottom: none; }
.wf-list-row .check {
  width: 12px; height: 12px;
  border: 1px solid var(--line-2);
  border-radius: 2px;
  flex-shrink: 0;
}
.wf-list-row.done .check { background: var(--accent-3); border-color: var(--accent-3); }
.wf-list-row.done .text { text-decoration: line-through; color: var(--ink-3); }
.wf-list-row .text { flex: 1; }
.wf-list-row .meta {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--ink-3);
}

/* Section divider */
.wf-divider {
  border: 0;
  border-top: 1.5px dashed var(--line);
  margin: 14px 0;
}

/* ---- Sticky-note annotation overlay ---- */
.wf-note {
  position: absolute;
  background: var(--post-it);
  color: var(--ink);
  font-family: var(--font-hand);
  font-size: 16px;
  line-height: 1.15;
  padding: 8px 10px;
  border-radius: 1px;
  box-shadow: 2px 4px 6px rgba(0,0,0,0.15);
  max-width: 160px;
  z-index: 5;
  transform: rotate(-2.5deg);
  pointer-events: none;
}
.wf-note.right { transform: rotate(1.8deg); }
.wf-note.flat { transform: rotate(0deg); }
.wf-note .arrow {
  position: absolute;
  width: 20px; height: 14px;
  pointer-events: none;
}

/* Hide notes when annotations off (toggled via root class) */
body.notes-off .wf-note { display: none; }

/* ---- 2-col layout helper inside main ---- */
.wf-2col {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 14px;
  margin: 10px 0;
}
.wf-2col.even { grid-template-columns: 1fr 1fr; }

/* ---- Property meta line ---- */
.wf-props {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--ink-3);
  margin: 6px 0 10px;
  padding: 6px 0;
  border-top: 1px dotted var(--line);
  border-bottom: 1px dotted var(--line);
}
.wf-props span b {
  color: var(--ink);
  font-weight: normal;
  margin-left: 4px;
}

/* ---- Big "lyric writing" block ---- */
.wf-lyric {
  background:
    repeating-linear-gradient(to bottom, transparent 0 18px, var(--line) 18px 19px);
  background-attachment: local;
  padding: 0 4px;
  min-height: 72px;
  font-family: var(--font-hand);
  font-size: 16px;
  line-height: 19px;
  color: var(--ink-2);
}

/* ---- Tab control inside main ---- */
.wf-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.5px;
}
.wf-tabs .tab {
  padding: 5px 10px;
  color: var(--ink-3);
  border-bottom: 2px solid transparent;
  cursor: default;
}
.wf-tabs .tab.active {
  color: var(--ink);
  border-bottom-color: var(--accent);
}

/* ---- Calendar mini ---- */
.wf-cal {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  font-family: var(--font-mono);
  font-size: 8px;
  margin: 6px 0;
}
.wf-cal .day {
  aspect-ratio: 1;
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 2px;
  color: var(--ink-3);
  position: relative;
}
.wf-cal .day .num { font-size: 8px; }
.wf-cal .day.has-evt { background: var(--notion-orange-bg); color: var(--notion-default); }
.wf-cal .day.has-evt::after {
  content: ""; position: absolute; bottom: 2px; left: 2px; right: 2px; height: 2px;
  background: var(--notion-orange); border-radius: 1px;
}

/* ---- Search bar mock ---- */
.wf-search {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-3);
  margin-bottom: 10px;
}
.wf-search .kbd {
  font-size: 8px;
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 1px 4px;
  margin-left: auto;
  background: var(--paper-2);
}

/* ---- Tweak panel (custom for this wireframe) ---- */
.wf-tweaks {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 100;
  background: var(--paper);
  border: 2px dashed var(--ink);
  border-radius: 6px;
  padding: 14px 16px;
  font-family: var(--font-print);
  box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
  transform: rotate(-0.3deg);
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 220px;
}
.wf-tweaks h4 {
  font-family: var(--font-hand);
  font-size: 20px;
  line-height: 1;
  color: var(--ink);
  margin: 0 0 4px;
}
.wf-tweaks .tw-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}
.wf-tweaks .tw-toggle {
  width: 36px; height: 20px;
  background: var(--paper-2);
  border: 1.5px solid var(--ink);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}
.wf-tweaks .tw-toggle::after {
  content: "";
  position: absolute;
  top: 1px; left: 1px;
  width: 14px; height: 14px;
  background: var(--ink);
  border-radius: 50%;
  transition: transform .15s ease;
}
.wf-tweaks .tw-toggle.on { background: var(--accent); border-color: var(--accent); }
.wf-tweaks .tw-toggle.on::after {
  transform: translateX(16px);
  background: var(--paper);
}
.wf-tweaks .tw-label { flex: 1; color: var(--ink); }
.wf-tweaks .tw-hint {
