<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JaZeR Music OS v2 - Planning Resource Library</title>
<style>
  :root {
    --bg: #08080b;
    --surface: #111118;
    --surface-2: #181820;
    --border: #292938;
    --text: #ededf5;
    --muted: #9696aa;
    --accent: #e8c94a;
    --accent-2: #41d49a;
    --shadow: rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  .app-shell {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
  }

  .topbar {
    position: relative;
    z-index: 2;
    padding: 18px 20px 14px;
    background: linear-gradient(180deg, #111118 0%, #0c0c11 100%);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 14px 32px var(--shadow);
  }

  .title-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 14px;
  }

  h1 {
    margin: 0;
    font-size: clamp(20px, 3vw, 30px);
    line-height: 1.05;
    font-weight: 750;
    letter-spacing: 0;
  }

  .subtitle {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .source-note {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
  }

  .tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-color: var(--border) transparent;
  }

  .tab-button {
    flex: 0 0 auto;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--muted);
    border-radius: 8px;
    padding: 9px 13px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 160ms ease, color 160ms ease, background 160ms ease;
  }

  .tab-button:hover,
  .tab-button:focus-visible {
    border-color: var(--accent);
    color: var(--text);
    outline: none;
  }

  .tab-button.is-active {
    background: #20202a;
    border-color: var(--accent);
    color: var(--accent);
  }

  .content {
    min-height: 0;
    background: var(--bg);
  }

  .tab-panel {
    display: none;
    height: 100%;
    min-height: 0;
  }

  .tab-panel.is-active { display: block; }

  iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
    background: #0a0a0c;
  }

  @media (max-width: 760px) {
    body { overflow: hidden; }

    .topbar { padding: 14px 12px 12px; }

    .title-row {
      display: block;
      margin-bottom: 12px;
    }

    .source-note {
      display: block;
      margin-top: 8px;
      white-space: normal;
    }

    .tab-button {
      padding: 8px 10px;
      font-size: 12px;
    }
  }
</style>
</head>

<script>
  const buttons = Array.from(document.querySelectorAll('[data-tab]'));
  const panels = Array.from(document.querySelectorAll('[data-panel]'));

  function loadPanel(panel) {
    const frame = panel.querySelector('iframe');
    if (frame && !frame.src) frame.src = frame.dataset.src;
  }

  function activateTab(id) {
    buttons.forEach((button) => {
      const active = button.dataset.tab === id;
      button.classList.toggle('is-active', active);
      button.setAttribute('aria-selected', String(active));
    });

    panels.forEach((panel) => {
      const active = panel.dataset.panel === id;
      panel.classList.toggle('is-active', active);
      if (active) loadPanel(panel);
    });
  }

  buttons.forEach((button) => {
    button.addEventListener('click', () => activateTab(button.dataset.tab));
  });

  document.addEventListener('keydown', (event) => {
    const currentIndex = buttons.findIndex((button) => button.classList.contains('is-active'));
    if (event.key === 'ArrowRight') {
      event.preventDefault();
      const next = buttons[(currentIndex + 1) % buttons.length];
      next.focus();
      activateTab(next.dataset.tab);
    }
    if (event.key === 'ArrowLeft') {
      event.preventDefault();
      const previous = buttons[(currentIndex - 1 + buttons.length) % buttons.length];
      previous.focus();
      activateTab(previous.dataset.tab);
    }
  });

  loadPanel(document.querySelector('.tab-panel.is-active'));
</script>
