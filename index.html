<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JaZeR Music OS v2 — Dark & Light Theme Wireframes</title>
<style>
  :root {
    --bg: #0b0b0e;
    --surface: #15151b;
    --surface-2: #1e1e26;
    --border: #30303a;
    --text: #f1f1f4;
    --muted: #a4a0ad;
    --gold: #d6b84d;
    --blue: #6ba7ff;
    --shadow: rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  body { display: grid; grid-template-rows: auto 1fr; }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: linear-gradient(180deg, #16161d 0%, #0c0c10 100%);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 12px 28px var(--shadow);
    padding: 16px 20px 14px;
  }
  .title-row { display: flex; justify-content: space-between; gap: 18px; align-items: end; margin-bottom: 12px; }
  h1 { margin: 0; font-size: clamp(20px, 2.7vw, 32px); line-height: 1.05; letter-spacing: -0.03em; }
  .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
  .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  button, a.button {
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--muted);
    border-radius: 10px;
    padding: 9px 12px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: color .16s ease, border-color .16s ease, background .16s ease;
  }
  button:hover, a.button:hover { border-color: var(--gold); color: var(--text); }
  button.active { background: rgba(214,184,77,.14); color: var(--gold); border-color: rgba(214,184,77,.55); }
  .viewer { height: calc(100vh - 125px); min-height: 520px; background: #0a0a0c; }
  .frame-single { width: 100%; height: 100%; border: 0; display: block; background: #0a0a0c; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; height: 100%; gap: 1px; background: var(--border); }
  .pane { min-width: 0; background: #0a0a0c; position: relative; }
  .pane-label { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(10,10,12,.78); color: #fff; border: 1px solid rgba(255,255,255,.15); border-radius: 999px; padding: 5px 10px; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; backdrop-filter: blur(8px); }
  .pane iframe { width: 100%; height: 100%; border: 0; background: #0a0a0c; }
  .status { font-size: 12px; color: var(--muted); margin-left: auto; }
  @media (max-width: 900px) {
    .title-row { display: block; }
    .meta { display: block; margin-top: 6px; white-space: normal; }
    .viewer { height: calc(100vh - 160px); }
    .compare-grid { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="title-row">
    <div>
      <h1>JaZeR Music OS v2 — Dark & Light Theme Wireframes</h1>
      <p class="subtitle">Single review shell for the new themed wireframe set. Toggle either theme or compare both.</p>
    </div>
    <div class="meta">Source: Dark + Flat/Light theme package</div>
  </div>
  <div class="controls">
    <button id="darkBtn" class="active" type="button">Dark Theme</button>
    <button id="lightBtn" type="button">Light Theme</button>
    <button id="compareBtn" type="button">Compare Both</button>
    <button id="reloadBtn" type="button">Reload Frame</button>
    <button id="openBtn" type="button">Open Current in New Tab</button>
    <span class="status" id="status">Dark theme loaded</span>
  </div>
</header>

<main id="viewer" class="viewer">
  <iframe id="singleFrame" class="frame-single" title="JaZeR Music OS v2 Wireframes"></iframe>
</main>

let currentMode = 'dark';
let blobUrls = {};

function htmlFromBase64(key) {
  const raw = atob(THEMES[key]);
  const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}

function blobUrlFor(key) {
  if (!blobUrls[key]) {
    const html = htmlFromBase64(key);
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    blobUrls[key] = URL.createObjectURL(blob);
  }
  return blobUrls[key];
}

function setButtons(active) {
  for (const id of ['darkBtn', 'lightBtn', 'compareBtn']) document.getElementById(id).classList.remove('active');
  document.getElementById(active + 'Btn')?.classList.add('active');
}

function showSingle(key) {
  currentMode = key;
  setButtons(key);
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = '<iframe id="singleFrame" class="frame-single" title="JaZeR Music OS v2 Wireframes"></iframe>';
  document.getElementById('singleFrame').src = blobUrlFor(key);
  document.getElementById('status').textContent = (key === 'dark' ? 'Dark' : 'Light') + ' theme loaded';
}

function showCompare() {
  currentMode = 'compare';
  setButtons('compare');
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = `
    <div class="compare-grid">
      <div class="pane"><div class="pane-label">Dark</div><iframe title="Dark theme wireframes"></iframe></div>
      <div class="pane"><div class="pane-label">Light</div><iframe title="Light theme wireframes"></iframe></div>
    </div>`;
  const frames = viewer.querySelectorAll('iframe');
  frames[0].src = blobUrlFor('dark');
  frames[1].src = blobUrlFor('light');
  document.getElementById('status').textContent = 'Comparison view loaded';
}

function reloadCurrent() {
  if (currentMode === 'compare') return showCompare();
  showSingle(currentMode);
}

function openCurrent() {
  if (currentMode === 'compare') {
    window.open(blobUrlFor('dark'), '_blank');
    window.open(blobUrlFor('light'), '_blank');
  } else {
    window.open(blobUrlFor(currentMode), '_blank');
  }
}

document.getElementById('darkBtn').addEventListener('click', () => showSingle('dark'));
document.getElementById('lightBtn').addEventListener('click', () => showSingle('light'));
document.getElementById('compareBtn').addEventListener('click', showCompare);
document.getElementById('reloadBtn').addEventListener('click', reloadCurrent);
document.getElementById('openBtn').addEventListener('click', openCurrent);

showSingle('dark');
